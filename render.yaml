services:
  - type: web
    name: autofelvasarlas
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    disk:
      name: autofelvasarlas-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /opt/render/project/src/storage/data
      - key: UPLOAD_DIR
        value: /opt/render/project/src/storage/uploads
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_ACCESS_PATH
        value: /admin/autofelvasarlas-privat-vezerlopult-2026
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
